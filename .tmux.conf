# Terminal support (macOS fix)
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Prefix remap (Ctrl+a like screen)
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Splits (preserve cwd)
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Reload config (FIXED typo)
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Sessionizer script (ensure it exists)
bind-key -r f run-shell "~/.local/scripts/tmux-sessionizer"

# Resize panes (vim style)
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Maximize pane
bind -r m resize-pane -Z

# Enable mouse
set -g mouse on

# Let terminal own the clipboard via OSC52
set -g set-clipboard on

# Vim-style copy mode
setw -g mode-keys vi

# v = begin selection, V = line select, C-v = rectangle toggle
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# y and Enter copy to macOS system clipboard
bind-key -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Mouse drag release copies selection to system clipboard (and stays in copy mode so selection remains)
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"

# Double-click = copy word, triple-click = copy line
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "pbcopy"
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "pbcopy"
bind-key -n DoubleClick1Pane select-pane \; copy-mode -M \; send -X select-word \; send -X copy-pipe-no-clear "pbcopy"
bind-key -n TripleClick1Pane select-pane \; copy-mode -M \; send -X select-line \; send -X copy-pipe-no-clear "pbcopy"

# Right-click pastes from system clipboard
bind-key -n MouseDown3Pane run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Prefix + p pastes from system clipboard too
bind p run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmux-themepack'

# Theme
set -g @themepack 'powerline/default/cyan'

# Restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -s copy-command 'pbcopy' # For macOS
# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
